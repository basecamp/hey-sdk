name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smithy-verify:
    uses: ./.github/workflows/smithy-verify.yml

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go/go.mod'
          cache-dependency-path: 'go/go.sum'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Check service layer drift
        run: ../scripts/check-service-drift.sh

  lint-go:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go/go.mod'
          cache-dependency-path: 'go/go.sum'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          working-directory: go
          version: latest
          args: --config .golangci.yml

  lint-actions:
    name: GitHub Actions audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: rhysd/actionlint@393031adb9afb225ee52ae2ccd7a5af5525e03e8 # v1.7.11

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2
        with:
          advanced-security: false

  conformance:
    name: Conformance Tests
    runs-on: ubuntu-latest
    needs: [test-go]
    defaults:
      run:
        working-directory: conformance/runner/go
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'conformance/runner/go/go.mod'
          cache-dependency-path: 'conformance/runner/go/go.sum'

      - name: Run conformance tests
        run: go run .

  api-compat:
    name: API Compatibility
    if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'breaking')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go/go.mod'
          cache-dependency-path: 'go/go.sum'

      - name: Install apidiff
        run: go install golang.org/x/exp/cmd/apidiff@v0.0.0-20250305212735-054e65f0b394

      - name: Check API compatibility
        # Compares go/pkg/hey — the sole exported package (internal/ is not public API).
        # Each apidiff invocation runs inside its respective module directory so
        # go list can resolve the package.
        run: |
          echo "Checking Go SDK API compatibility..."
          (cd base/go && apidiff -w /tmp/base.api ./pkg/hey)
          CHANGES=$(cd go && apidiff -incompatible /tmp/base.api ./pkg/hey 2>/tmp/apidiff.stderr) || status=$?
          status=${status:-0}
          if [ "$status" -ne 0 ]; then
            echo "::error::apidiff execution failed (exit $status)"
            cat /tmp/apidiff.stderr
            exit "$status"
          fi
          rm -f /tmp/apidiff.stderr
          if [ -n "$CHANGES" ]; then
            echo "::error::Incompatible API changes detected"
            echo "$CHANGES"
            exit 1
          else
            echo "No breaking API changes detected"
          fi

  rubric-check:
    name: Rubric Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check critical rubric criteria
        run: |
          pass=0; total=4
          check() { if eval "$2"; then echo "PASS $1"; pass=$((pass+1)); else echo "FAIL $1: $3"; fi; }

          check "1A.1 Smithy spec" \
            '[ -d spec ] && [ -f spec/smithy-build.json ]' \
            "spec/ or smithy-build.json missing"
          check "1A.2 OpenAPI from Smithy" \
            '[ -f openapi.json ] && grep -q "Smithy" spec/smithy-build.json' \
            "openapi.json missing or not Smithy-generated"
          check "2A.1 Structured errors" \
            'grep -rq "ErrorCode\|error_code\|errorCode" --include="*.go" .' \
            "No structured error type found"
          check "4A.1 Smithy freshness" \
            'grep -q "smithy-check" Makefile' \
            "No smithy-check target in Makefile"

          echo "Critical: $pass/$total"
          [ "$pass" -eq "$total" ]
