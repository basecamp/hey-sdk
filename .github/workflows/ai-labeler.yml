name: Classify PR

on:
  pull_request_target: # zizmor: ignore[dangerous-triggers] -- required for write access to PRs from forks; workflow only runs trusted actions and base-branch scripts, no PR code is checked out or executed
    types: [opened, synchronize, reopened]

concurrency:
  group: classify-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  classify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr diff "$PR" > /tmp/pr.diff
          gh pr view "$PR" --json title --jq .title > /tmp/pr-title.txt
          gh pr view "$PR" --json body --jq '.body // ""' > /tmp/pr-body.txt

          # Compose user message
          {
            printf 'PR #%s: %s\n' "$PR" "$(cat /tmp/pr-title.txt)"
            echo ""
            cat /tmp/pr-body.txt
            echo ""
            echo "Diff (truncated):"
            head -c 100000 /tmp/pr.diff
          } > /tmp/user-message.txt

          # Build full prompt YAML: splice user message into the messages array
          # (avoids yaml round-trip which reorders keys and changes scalar styles)
          python3 .github/scripts/splice-prompt.py .github/prompts/classify-pr.prompt.yml /tmp/prompt.yml

      - name: Classify
        id: classify
        uses: actions/ai-inference@b81b2afb8390ee6839b494a404766bef6493c7d9 # v1.2.8
        with:
          prompt-file: /tmp/prompt.yml

      - name: Apply label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLASSIFY_RESPONSE_FILE: ${{ steps.classify.outputs.response-file }}
        run: |
          LABEL=$(cat "${CLASSIFY_RESPONSE_FILE}" | tr -d '[:space:]' | tr '[:upper:]' '[:lower:]')
          case "$LABEL" in
            bug|enhancement|documentation) ;;
            *) echo "Unexpected: $LABEL — skipping"; exit 0 ;;
          esac
          PR=${{ github.event.pull_request.number }}
          CURRENT=$(gh pr view "$PR" --json labels --jq '.labels[].name')
          for L in bug enhancement documentation; do
            if [ "$L" != "$LABEL" ] && echo "$CURRENT" | grep -qx "$L"; then
              gh pr edit "$PR" --remove-label "$L" 2>/dev/null || true
            fi
          done
          if ! echo "$CURRENT" | grep -qx "$LABEL"; then
            gh pr edit "$PR" --add-label "$LABEL" 2>/dev/null || true
          fi

  breaking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      models: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build prompt
        id: api-diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}

          # Public API surface files (Go only)
          PATTERNS=(
            "go/pkg/hey/*.go"
          )
          gh pr diff "$PR" > /tmp/full.diff

          # Filter diff to only public API files
          python3 -c "
          import sys, re, fnmatch
          diff = open('/tmp/full.diff').read()
          patterns = sys.argv[1:]
          sections = re.split(r'(?=^diff --git)', diff, flags=re.MULTILINE)
          for s in sections:
              m = re.match(r'diff --git a/(\S+)', s)
              if m:
                  path = m.group(1)
                  if any(fnmatch.fnmatch(path, p) for p in patterns):
                      sys.stdout.write(s)
          " "${PATTERNS[@]}" > /tmp/api.diff

          if [ ! -s /tmp/api.diff ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            TITLE=$(gh pr view "$PR" --json title --jq .title)

            # Compose user message
            {
              printf 'PR #%s: %s\n' "$PR" "$TITLE"
              echo ""
              echo "Diff of public API surface files:"
              head -c 100000 /tmp/api.diff
            } > /tmp/user-message.txt

            # Build full prompt YAML: splice user message into the messages array
            # (avoids yaml round-trip which reorders keys and changes scalar styles)
            python3 .github/scripts/splice-prompt.py .github/prompts/detect-breaking.prompt.yml /tmp/prompt.yml
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up stale breaking label
        if: steps.api-diff.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          gh pr edit "$PR" --remove-label "breaking" 2>/dev/null || true

      - name: Detect breaking changes
        if: steps.api-diff.outputs.skip != 'true'
        id: detect
        uses: actions/ai-inference@b81b2afb8390ee6839b494a404766bef6493c7d9 # v1.2.8
        with:
          prompt-file: /tmp/prompt.yml

      - name: Apply breaking label
        if: steps.api-diff.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DETECT_RESPONSE_FILE: ${{ steps.detect.outputs.response-file }}
        run: |
          # Read response from file to avoid backtick/quote issues in shell
          RESPONSE_FILE="${DETECT_RESPONSE_FILE}"
          if ! jq empty "$RESPONSE_FILE" 2>/dev/null; then
            echo "::warning::Model response is not valid JSON; skipping breaking label. See step summary for details."
            {
              echo "## Breaking change detection failed"
              echo "Model returned invalid JSON. Breaking label was **not** applied."
              echo '```'
              cat "$RESPONSE_FILE"
              echo ""
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BREAKING=$(jq -r '.breaking' "$RESPONSE_FILE")
          PR=${{ github.event.pull_request.number }}

          if [ "$BREAKING" = "true" ]; then
            ITEMS=$(jq -r '.items[]' "$RESPONSE_FILE" | sed 's/^/- /')
            gh label create breaking --color "B60205" 2>/dev/null || true
            gh pr edit "$PR" --add-label "breaking"

            # Build comment body; sanitize @ mentions from model output
            {
              echo "<!-- hey-sdk-bot:breaking -->"
              echo "**Potential breaking changes detected:**"
              echo ""
              echo "$ITEMS"
              echo ""
              echo "_Review carefully before merging. Consider a major version bump._"
            } | sed 's/@/@ /g' > /tmp/breaking-comment.md

            # Find existing bot comment or create new
            EXISTING=$(gh pr view "$PR" --json comments --jq '.comments[] | select(.body | startswith("<!-- hey-sdk-bot:breaking -->")) | .id' | head -1)
            if [ -n "$EXISTING" ]; then
              gh api graphql -f query="mutation { updateIssueComment(input: {id: \"$EXISTING\", body: $(jq -Rs . /tmp/breaking-comment.md)}) { issueComment { id } } }"
            else
              gh pr comment "$PR" --body-file /tmp/breaking-comment.md
            fi
          else
            gh pr edit "$PR" --remove-label "breaking" 2>/dev/null || true
          fi

  spec-impact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build prompt
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          CHANGED=$(gh pr diff "$PR" --name-only | grep -cE '^(spec/|openapi\.json|behavior-model\.json)' || true)
          if [ "$CHANGED" -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            # Filter diff to only spec/API surface files
            PATTERNS=(
              "spec/*"
              "openapi.json"
              "behavior-model.json"
            )
            gh pr diff "$PR" > /tmp/full-spec.diff

            python3 -c "
          import sys, re, fnmatch
          diff = open('/tmp/full-spec.diff').read()
          patterns = sys.argv[1:]
          sections = re.split(r'(?=^diff --git)', diff, flags=re.MULTILINE)
          for s in sections:
              m = re.match(r'diff --git a/(\S+)', s)
              if m:
                  path = m.group(1)
                  if any(fnmatch.fnmatch(path, p) for p in patterns):
                      sys.stdout.write(s)
            " "${PATTERNS[@]}" > /tmp/spec.diff

            if [ ! -s /tmp/spec.diff ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            TITLE=$(gh pr view "$PR" --json title --jq .title)

            # Compose user message
            {
              printf 'PR #%s: %s\n' "$PR" "$TITLE"
              echo ""
              echo "Spec diff:"
              head -c 100000 /tmp/spec.diff
            } > /tmp/user-message.txt

            # Build full prompt YAML: splice user message into the messages array
            # (avoids yaml round-trip which reorders keys and changes scalar styles)
            python3 .github/scripts/splice-prompt.py .github/prompts/spec-impact.prompt.yml /tmp/prompt.yml
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clean up stale spec-impact comment
        if: steps.check.outputs.skip == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR=${{ github.event.pull_request.number }}
          EXISTING=$(gh pr view "$PR" --json comments --jq '.comments[] | select(.body | startswith("<!-- hey-sdk-bot:spec-impact -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api graphql -f query="mutation { minimizeComment(input: {subjectId: \"$EXISTING\", classifier: OUTDATED}) { minimizedComment { isMinimized } } }"
          fi

      - name: Analyze impact
        if: steps.check.outputs.skip != 'true'
        id: analyze
        uses: actions/ai-inference@b81b2afb8390ee6839b494a404766bef6493c7d9 # v1.2.8
        with:
          prompt-file: /tmp/prompt.yml

      - name: Post impact comment
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANALYZE_RESPONSE_FILE: ${{ steps.analyze.outputs.response-file }}
        run: |
          RESPONSE_FILE="${ANALYZE_RESPONSE_FILE}"

          # Sanitize model output: strip @ mentions, validate heading, truncate
          sed 's/@/@ /g' "$RESPONSE_FILE" > /tmp/spec-raw.md
          MARKER="<!-- hey-sdk-bot:spec-impact -->"
          if ! head -1 /tmp/spec-raw.md | grep -q '^## Spec Change Impact'; then
            {
              echo "$MARKER"
              echo "## Spec Change Impact"
              echo ""
              echo "_Model output did not match expected format. Raw output truncated below._"
              echo '```'
              head -c 2000 /tmp/spec-raw.md
              echo ""
              echo '```'
            } > /tmp/spec-comment.md
          else
            { echo "$MARKER"; head -c 10000 /tmp/spec-raw.md; } > /tmp/spec-comment.md
          fi

          PR=${{ github.event.pull_request.number }}
          EXISTING=$(gh pr view "$PR" --json comments --jq '.comments[] | select(.body | startswith("<!-- hey-sdk-bot:spec-impact -->")) | .id' | head -1)
          if [ -n "$EXISTING" ]; then
            gh api graphql -f query="mutation { updateIssueComment(input: {id: \"$EXISTING\", body: $(jq -Rs . /tmp/spec-comment.md)}) { issueComment { id } } }"
          else
            gh pr comment "$PR" --body-file /tmp/spec-comment.md
          fi
